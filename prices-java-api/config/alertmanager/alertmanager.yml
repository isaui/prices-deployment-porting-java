global:
  resolve_timeout: 1m

route:
  receiver: discord
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: '${DISCORD_WEBHOOK_URL}'
        title: '{{ if eq .Status "firing" }}FIRING{{ else }}RESOLVED{{ end }} - {{ .GroupLabels.alertname }}'
        message: |
          {{ if eq .Status "firing" }}
          {{ range .Alerts.Firing }}
          **{{ .Labels.alertname }}** | {{ .Labels.severity }} | {{ .Labels.layer }}
          {{ .Annotations.summary }}
          Since: {{ .StartsAt.Format "2006-01-02 15:04:05 WIB" }}
          {{ end }}
          {{ else }}
          {{ range .Alerts.Resolved }}
          **{{ .Labels.alertname }}** | {{ .Labels.layer }}
          Fired at: {{ .StartsAt.Format "2006-01-02 15:04:05 WIB" }}
          Resolved at: {{ .EndsAt.Format "2006-01-02 15:04:05 WIB" }}
          The issue is no longer detected.
          {{ end }}
          {{ end }}
        send_resolved: true
