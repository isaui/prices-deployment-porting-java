global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: '${DISCORD_WEBHOOK_URL}'
        title: '{{ if eq .Status "firing" }}[FIRING:{{ .Alerts.Firing | len }}]{{ else }}[RESOLVED:{{ .Alerts.Resolved | len }}]{{ end }} {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          **{{ .Labels.alertname }}** [{{ .Labels.severity }}]
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
