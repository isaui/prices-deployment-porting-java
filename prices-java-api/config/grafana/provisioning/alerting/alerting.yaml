apiVersion: 1

groups:
  - orgId: 1
    name: host-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: host-high-cpu
        title: High CPU Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{job="node-exporter", mode="idle"}[5m])) * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: host
        annotations:
          summary: "Host CPU usage is above 85%"
          description: "CPU usage has been {{ $values.A.Value | printf \"%.1f\" }}% for more than 5 minutes."

      - uid: host-high-memory
        title: High Memory Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) * 100
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: host
        annotations:
          summary: "Host memory usage is above 90%"
          description: "Memory usage has been {{ $values.A.Value | printf \"%.1f\" }}% for more than 5 minutes."

      - uid: host-disk-full
        title: Disk Almost Full
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 100 - (node_filesystem_avail_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} / node_filesystem_size_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
              refId: C
        for: 5m
        labels:
          severity: critical
          layer: host
        annotations:
          summary: "Disk usage is above 90%"
          description: "Root filesystem usage is {{ $values.A.Value | printf \"%.1f\" }}%."

  - orgId: 1
    name: postgres-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: pg-down
        title: PostgreSQL Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: pg_up{job="postgres-exporter"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: C
        for: 1m
        labels:
          severity: critical
          layer: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter reports pg_up = 0. Database is unreachable."

      - uid: pg-high-connections
        title: High DB Connections
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(pg_stat_activity_count{job="postgres-exporter", state="active"})
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 50
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: database
        annotations:
          summary: "High number of active DB connections"
          description: "Active PostgreSQL connections: {{ $values.A.Value }}. Threshold: 50."

