  - orgId: 1
    name: container-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: container-died
        title: Container Died
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(docker_events_container_total{status="die"}[5m]) > 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: C
        for: 0s
        labels:
          severity: critical
          layer: container
        annotations:
          summary: "Container {{ $labels.container_attributes_name }} died"
          description: "Container {{ $labels.container_attributes_name }} died with exit code {{ $labels.container_attributes_exitcode }}."

  - orgId: 1
    name: traefik-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: traefik-high-error-rate
        title: High HTTP Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (service) (rate(traefik_service_requests_total{job="traefik", code=~"4..|5.."}[5m])) / sum by (service) (rate(traefik_service_requests_total{job="traefik"}[5m])) > 0.05
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: application
        annotations:
          summary: "High HTTP error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has error rate {{ $values.A.Value | printf \"%.1f\" }}% (threshold: 5%)."

policies:
  - orgId: 1
    receiver: discord-webhook
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

contactPoints:
  - orgId: 1
    name: discord-webhook
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          use_discord_username: true
          message: |
            {{ len .Alerts.Firing }} alert(s) firing, {{ len .Alerts.Resolved }} resolved.
            {{ range .Alerts.Firing }}
            🔴 **{{ .Labels.alertname }}** [{{ .Labels.severity }}]
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
            {{ range .Alerts.Resolved }}
            ✅ **{{ .Labels.alertname }}** resolved
            {{ end }}
        disableResolveMessage: false
