apiVersion: 1

groups:
  - orgId: 1
    name: host-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: host-high-cpu
        title: High CPU Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{job="node-exporter", mode="idle"}[5m])) * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: host
        annotations:
          summary: "[WARNING] Host CPU > 85%"
          description: "CPU usage: {{ $values.A.Value | printf \"%.1f\" }}% (threshold: 85%). Sustained for 5+ minutes. Check running processes or consider scaling."

      - uid: host-high-memory
        title: High Memory Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) * 100
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: host
        annotations:
          summary: "[WARNING] Host Memory > 90%"
          description: "Memory usage: {{ $values.A.Value | printf \"%.1f\" }}% (threshold: 90%). Sustained for 5+ minutes. Possible memory leak or too many containers."

      - uid: host-disk-full
        title: Disk Almost Full
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 100 - (node_filesystem_avail_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} / node_filesystem_size_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
              refId: C
        for: 5m
        labels:
          severity: critical
          layer: host
        annotations:
          summary: "[CRITICAL] Disk usage > 90%"
          description: "Root filesystem: {{ $values.A.Value | printf \"%.1f\" }}% used (threshold: 90%). Run `docker system prune` or expand disk."

  - orgId: 1
    name: postgres-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: pg-down
        title: PostgreSQL Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: pg_up{job="postgres-exporter"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: C
        for: 1m
        labels:
          severity: critical
          layer: database
        annotations:
          summary: "[CRITICAL] PostgreSQL is DOWN"
          description: "Database unreachable for 1+ minute. All services depending on DB are affected. Check container status and logs."

      - uid: pg-high-connections
        title: High DB Connections
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(pg_stat_activity_count{job="postgres-exporter", state="active"})
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 50
              refId: C
        for: 5m
        labels:
          severity: warning
          layer: database
        annotations:
          summary: "[WARNING] High DB connections"
          description: "Active connections: {{ $values.A.Value }} (threshold: 50). Sustained for 5+ minutes. Possible connection leak or high load."

  - orgId: 1
    name: container-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: container-died
        title: Container Died
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: container_state_status{status="running"} == 0
              instant: true
              refId: A
        for: 30s
        labels:
          severity: critical
          layer: container
        annotations:
          summary: "[CRITICAL] Container {{ $labels.name }} is DOWN"
          description: "Container {{ $labels.name }} (image: {{ $labels.image }}) stopped running. Check logs: docker logs {{ $labels.name }}"

  - orgId: 1
    name: traefik-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: traefik-high-error-rate
        title: High HTTP Error Rate
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (service) (rate(traefik_service_requests_total{job="traefik", code=~"5.."}[5m])) / sum by (service) (rate(traefik_service_requests_total{job="traefik"}[5m])) > 0.05
              instant: true
              refId: A
        for: 5m
        labels:
          severity: warning
          layer: application
        annotations:
          summary: "[WARNING] High 5xx error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} returning >5% server errors for 5+ minutes. Check backend logs for the affected service."

policies:
  - orgId: 1
    receiver: discord-webhook
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

contactPoints:
  - orgId: 1
    name: discord-webhook
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          use_discord_username: true
          message: |
            {{ len .Alerts.Firing }} firing, {{ len .Alerts.Resolved }} resolved
            {{ range .Alerts.Firing }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
            {{ range .Alerts.Resolved }}
            [RESOLVED] {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false
