groups:
  - name: host-alerts
    interval: 1m
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{job="node-exporter", mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          layer: host
        annotations:
          summary: "[WARNING] Host CPU > 85%"
          description: "CPU usage: {{ $value | printf \"%.1f\" }}% (threshold: 85%). Sustained for 5+ minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) * 100 > 90
        for: 5m
        labels:
          severity: warning
          layer: host
        annotations:
          summary: "[WARNING] Host Memory > 90%"
          description: "Memory usage: {{ $value | printf \"%.1f\" }}% (threshold: 90%). Sustained for 5+ minutes."

      - alert: DiskAlmostFull
        expr: 100 - (node_filesystem_avail_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} / node_filesystem_size_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} * 100) > 90
        for: 5m
        labels:
          severity: critical
          layer: host
        annotations:
          summary: "[CRITICAL] Disk usage > 90%"
          description: "Root filesystem: {{ $value | printf \"%.1f\" }}% used (threshold: 90%). Run docker system prune or expand disk."

  - name: postgres-alerts
    interval: 1m
    rules:
      - alert: PostgreSQLDown
        expr: pg_up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          layer: database
        annotations:
          summary: "[CRITICAL] PostgreSQL is DOWN"
          description: "Database unreachable for 1+ minute. All services depending on DB are affected."

      - alert: HighDBConnections
        expr: sum(pg_stat_activity_count{job="postgres-exporter", state="active"}) > 50
        for: 5m
        labels:
          severity: warning
          layer: database
        annotations:
          summary: "[WARNING] High DB connections"
          description: "Active connections: {{ $value }} (threshold: 50). Sustained for 5+ minutes."

  - name: container-alerts
    interval: 15s
    rules:
      - alert: ContainerDied
        expr: container_state_status{status="running"} == 0
        for: 30s
        labels:
          severity: critical
          layer: container
        annotations:
          summary: "[CRITICAL] Container {{ $labels.name }} is DOWN"
          description: "Container {{ $labels.name }} (image: {{ $labels.image }}) stopped running. Check logs: docker logs {{ $labels.name }}"

  - name: traefik-alerts
    interval: 1m
    rules:
      - alert: HighHTTPErrorRate
        expr: sum by (service) (rate(traefik_service_requests_total{job="traefik", code=~"5.."}[5m])) / sum by (service) (rate(traefik_service_requests_total{job="traefik"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          layer: application
        annotations:
          summary: "[WARNING] High 5xx error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} returning >5% server errors for 5+ minutes."
