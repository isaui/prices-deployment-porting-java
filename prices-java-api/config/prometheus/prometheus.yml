global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'logporter'
    scrape_interval: 5s
    scrape_timeout: 1s
    static_configs:
      - targets: ['logporter:9333']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  - job_name: 'docker-state'
    scrape_interval: 10s
    static_configs:
      - targets: ['docker-state-exporter:8080']
