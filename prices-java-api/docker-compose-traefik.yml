version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prices-deployment-api
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-prices}
      - DB_PASSWORD=${DB_PASSWORD:-prices123}
      - DB_NAME=${DB_NAME:-prices_deployment}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - PRICES_DOMAIN=${PRICES_DOMAIN:-skripsi.isacitra.com}
      - PRICES_PROTOCOL=${PRICES_PROTOCOL:-https}
      - PRICES_EXTERNAL_DB_HOST=${PRICES_EXTERNAL_DB_HOST:-10.119.106.82}
      - PRICES_EXTERNAL_DB_PORT=${PRICES_EXTERNAL_DB_PORT:-5432}
      - PRICES_EXTERNAL_DB_USER=${PRICES_EXTERNAL_DB_USER:-deployment}
      - PRICES_EXTERNAL_DB_PASSWORD=${PRICES_EXTERNAL_DB_PASSWORD:-deployment123}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-vol/deployments:/var/prices/deployments
      - ./docker-vol/traefik:/var/prices/traefik
      - ./docker-vol/uploads:/var/prices/uploads
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started
    networks:
      - prices-network
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`deploy.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: prices-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-prices}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-prices123}
      - POSTGRES_DB=${DB_NAME:-prices_deployment}
    volumes:
      - ./docker-vol/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prices} -d ${DB_NAME:-prices_deployment}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prices-network
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    container_name: prices-traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=prices-proxy-network"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports:
      - "80:80"
      - "443:443"
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-vol/traefik/letsencrypt:/letsencrypt
      - ./docker-vol/traefik/dynamic:/etc/traefik/dynamic
    networks:
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      # Dashboard
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$xyz$$hashedpassword}"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:2.27.4
    container_name: prices-portainer
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-vol/portainer_data:/data
    networks:
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: prices-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - prices-network
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=Host(`cadvisor.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.cadvisor.entrypoints=websecure"
      - "traefik.http.routers.cadvisor.tls=true"
      - "traefik.http.routers.cadvisor.tls.certresolver=letsencrypt"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"
    restart: unless-stopped

  # ============ Observability Stack ============

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: prices-node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - prices-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: prices-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=${PG_EXPORTER_DSN:-postgresql://deployment:deployment123@10.119.106.82:5432/postgres?sslmode=disable}
    networks:
      - prices-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: prices-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - prices-network
      - prices-proxy-network
    depends_on:
      - tempo
      - prometheus
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prices-prometheus
    user: "0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker-vol/prometheus:/prometheus
    networks:
      - prices-network
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: prices-grafana
    user: "0"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    volumes:
      - ./docker-vol/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - prices-network
      - prices-proxy-network
    depends_on:
      - prometheus
      - loki
      - tempo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    container_name: prices-loki
    user: "0"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./docker-vol/loki:/loki
    networks:
      - prices-network
      - prices-proxy-network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.0
    container_name: prices-tempo
    user: "0"
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./config/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - ./docker-vol/tempo:/tmp/tempo
    networks:
      - prices-network
      - prices-proxy-network
    restart: unless-stopped

networks:
  prices-network:
    driver: bridge
  prices-proxy-network:
    driver: bridge
    name: prices-proxy-network
