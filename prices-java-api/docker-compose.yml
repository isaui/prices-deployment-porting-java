version: '3.8'

# Internal version - HTTPS handled by external reverse proxy
# Just forwards 80/443 to containers

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prices-deployment-api
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-prices}
      - DB_PASSWORD=${DB_PASSWORD:-prices123}
      - DB_NAME=${DB_NAME:-prices_deployment}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - PRICES_DOMAIN=${PRICES_DOMAIN:-skripsi.isacitra.com}
      - PRICES_PROTOCOL=${PRICES_PROTOCOL:-https}
      - PRICES_EXTERNAL_DB_HOST=${PRICES_EXTERNAL_DB_HOST:-10.119.106.82}
      - PRICES_EXTERNAL_DB_PORT=${PRICES_EXTERNAL_DB_PORT:-5432}
      - PRICES_EXTERNAL_DB_USER=${PRICES_EXTERNAL_DB_USER:-deployment}
      - PRICES_EXTERNAL_DB_PASSWORD=${PRICES_EXTERNAL_DB_PASSWORD:-deployment123}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-vol/deployments:/var/prices/deployments
      - ./docker-vol/traefik:/var/prices/traefik
      - ./docker-vol/uploads:/var/prices/uploads
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started
    networks:
      - prices-network
      - prices-proxy-network
    ports:
      - "127.0.0.1:8090:8080"  # Internal API access for deploy.sh
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`deploy.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.api.entrypoints=web,websecure"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: prices-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-prices}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-prices123}
      - POSTGRES_DB=${DB_NAME:-prices_deployment}
    volumes:
      - ./docker-vol/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prices} -d ${DB_NAME:-prices_deployment}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prices-network
    restart: unless-stopped

  traefik:
    image: traefik:3.6
    container_name: prices-traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=prices-proxy-network"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard (internal only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-vol/traefik/dynamic:/etc/traefik/dynamic
    networks:
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.traefik.entrypoints=web,websecure"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:2.27.4
    container_name: prices-portainer
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-vol/portainer_data:/data
    networks:
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.portainer.entrypoints=web,websecure"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    restart: unless-stopped

  logporter:
    image: lifailon/logporter:latest
    container_name: prices-logporter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - prices-network
      - prices-proxy-network
    restart: unless-stopped

  # ============ Observability Stack ============

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: prices-node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - prices-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: prices-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=${PG_EXPORTER_DSN:-postgresql://deployment:deployment123@10.119.106.82:5432/postgres?sslmode=disable}
    networks:
      - prices-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: prices-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - prices-network
      - prices-proxy-network
    depends_on:
      - tempo
      - prometheus
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prices-prometheus
    user: "0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker-vol/prometheus:/prometheus
    networks:
      - prices-network
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.prometheus.entrypoints=web,websecure"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.4
    container_name: prices-grafana
    user: "0"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVICE_ACCOUNTS_ENABLED=true
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_DISABLE_SIGNOUT_MENU=true
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_USERS_VIEWERS_CAN_EDIT=false
    volumes:
      - ./docker-vol/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - prices-network
      - prices-proxy-network
    depends_on:
      - prometheus
      - loki
      - tempo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.grafana.entrypoints=web,websecure"
      - "traefik.http.middlewares.grafana-prefix.addprefix.prefix=/grafana"
      - "traefik.http.routers.grafana.middlewares=grafana-prefix"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    container_name: prices-loki
    user: "0"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./docker-vol/loki:/loki
    networks:
      - prices-network
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`loki.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.loki.entrypoints=web,websecure"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.0
    container_name: prices-tempo
    user: "0"
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./config/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - ./docker-vol/tempo:/tmp/tempo
    networks:
      - prices-network
      - prices-proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tempo.rule=Host(`tempo.${PRICES_DOMAIN:-skripsi.isacitra.com}`)"
      - "traefik.http.routers.tempo.entrypoints=web,websecure"
      - "traefik.http.services.tempo.loadbalancer.server.port=3200"
    restart: unless-stopped

networks:
  prices-network:
    driver: bridge
  prices-proxy-network:
    driver: bridge
    name: prices-proxy-network
